name: Daily Instagram post

on:
  schedule:
    # All times UTC. Odd minutes to dodge GitHub's busy-slot drops.
    - cron: "37 14 * * *"   # 8:07 PM IST  (India evening)
    - cron: "37 18 * * *"   # 7:37 PM CET  (Europe evening)
    - cron: "37 0 * * *"    # 7:37 PM EST  (US evening, lands next date IST)
  workflow_dispatch: {}     # manual test runs from the Actions tab

permissions:
  contents: write

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Generate + render card
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: cd src && python make_post.py

      - name: Commit today's card
        run: |
          git config user.name  "lone-ascent-bot"
          git config user.email "actions@users.noreply.github.com"
          git pull --rebase origin main
          git add output/
          git commit -m "post: $(date -u +%FT%H%M)" || echo "nothing to commit"
          git push

      - name: Publish to Instagram
        env:
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          GRAPH_VERSION: ${{ vars.GRAPH_VERSION }}
        run: cd src && python publish.py
